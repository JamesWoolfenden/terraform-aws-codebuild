---
# yamllint disable rule:line-length
default_language_version:
  python: python3.9
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: check-json
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: pretty-format-json
        args:
          - --autofix
      - id: detect-aws-credentials
        args:
          - --allow-missing-credentials
      - id: detect-private-key
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: ad1b27d73581aa16cca06fc4a0761fc563ffe8e8 # v1.5.6
    hooks:
      - id: forbid-tabs
        exclude_types: [python, javascript, dtd, markdown, makefile, xml]
        exclude: binary|\.bin$
  - repo: https://github.com/jameswoolfenden/pre-commit-shell
    rev: 062f0b028ae65827e04f91c1e6738cfcbe9b337f # v1.0.6
    hooks:
      - id: shell-lint
        exclude: template|\.template$
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e # v0.48.0
    hooks:
      - id: markdownlint
  - repo: https://github.com/jameswoolfenden/pre-commit
    rev: ba5c36a3150a4184f9ee362a5cf11611ee9ae185 # v0.1.52
    hooks:
      - id: terraform-fmt
        language_version: python3.9
      - id: tf2docs
        language_version: python3.9
  - repo: https://github.com/bridgecrewio/checkov
    rev: e52a901a3829d818d20c9b75e544845c8b756968 # 3.2.526
    hooks:
      - id: checkov
        verbose: true
        entry: checkov -d example/examplea --external-checks-dir checkov --download-external-modules true --compact
  - repo: https://github.com/jameswoolfenden/pike
    rev: d043242b9e1733e9e5a67c20bb87c05a4d563596 # v0.4.1
    hooks:
      - id: pike-docs-go
        args: ["readme","-d", ".", "-i"]
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/returntocorp/semgrep
    rev: 34b079df03bd8ed6860552adf3905cc5d146dc4d # v1.161.0
    hooks:
      - id: semgrep
        # See semgrep.dev/rulesets to select a ruleset and copy its URL
        args: ['--config', 'auto']
  - repo: https://github.com/aquasecurity/tfsec
    rev: b692c20b68c0121346b7b34e81d6b1867ca8e1a8 # v1.28.14
    hooks:
      - id: tfsec
        name: TFSec
        description: TFsec is a tool to statically analyze Terraform templates to spot potential security issues.
        language: golang
        entry: tfsec --include-passed
        pass_filenames: false
